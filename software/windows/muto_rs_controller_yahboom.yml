    name: Examples
    selector:
    - env
    - Examples
    value: "# Intent Mapping\n\n- **Command 1**: \"I'm currently at place1, and I'm\
      \ feeling a bit thirsty\"\n  - **Intent Analysis 1**: Search the map to identify\
      \ which area contains bottled water, then navigate to that area to locate the\
      \ water\n  - **Example**: 1. Navigate to Area A, 2. Observe whether bottled\
      \ water is present, 3. If bottled water is detected, measure the distance between\
      \ it and yourself, 4. Navigate back to the user's location at place1, then report\
      \ the findings\n\n- **Command 2**: \"I want to sleep\"\n  - **Intent Analysis\
      \ 2**: 1. Navigate to the master bedroom and observe whether the environment\
      \ is suitable for sleeping, 2. Tell the user a bedtime story to help calm their\
      \ emotions\n\n# Item Storage Locations\n\n**Master Bedroom**\n- Tissues, pen,\
      \ mobile phone\n\n**Kitchen**\n- Bottled water, Coca-Cola, Sprite, bread\n\n\
      **Zoo**"
    value_type: string
  - description: ''
    id: 8f07dfcf-a3f4-45c7-b16d-9d57120dac6b
    name: ability_function_name
    selector:
    - env
    - ability_function_name
    value: "\n\nThis document lists the core capability functions of the Muto robot.\n\
      \n## 1. Basic Movement Control (Use with robot_speak)\nSupported parameter priority:\
      \ `steps` > `distance_m` > `time_s` + `speed_ms`\n- `forward(steps, distance_m,\
      \ time_s, speed_ms)`: Move forward/Advance/Walk xx meters/xx seconds/xx meters\
      \ per second\n- `backward(steps, distance_m, time_s, speed_ms)`: Move backward/Retreat/Walk\
      \ xx meters/xx seconds/xx meters per second\n- `shift_left(steps, distance_m,\
      \ time_s, speed_ms)`: Shift left/Move left/Walk xx meters/xx seconds/xx meters\
      \ per second\n- `shift_right(steps, distance_m, time_s, speed_ms)`: Shift right/Move\
      \ right/Walk xx meters/xx seconds/xx meters per second\n- `rotate(direction,\
      \ angle_deg, time_s, angular_speed_deg_s)`: Rotate in place. direction optional\
      \ 'left'/'right'\n- `stop()`: Immediately stop all current movements\n\n## 2.\
      \ Preset Actions\n- `adjust_height(2)`: Restore default posture\n- `say_hello()`:\
      \ Say hello\n- `wave_no()`: Wave hand to say \"No\"\n- `fear_retreat()`: Fear\
      \ retreat\n- `curl_up()`: Curl up body\n- `stretch()`: Stretch body\n- `warm_up_squat()`:\
      \ Warm-up squat/Do push-up\n- `spin_in_place()`: Spin in place (Action performance)\n\
      - `big_stride()`: Big stride forward\n- `point_left_front(hold_time, amplitude)`:\
      \ Point with left front leg/Raise hand. amplitude range 10-60, default 60, hold_time\
      \ default 5 seconds\n- `point_right_front(hold_time, amplitude)`: Point with\
      \ right front leg/Raise hand. amplitude range 10-60, default 60, hold_time default\
      \ 5 seconds\n- `head_move(level, direction)`: Head (body) sway\n- `adjust_height(level)`:\
      \ Adjust body height, optional parameter 1~3, default height is 2, use 1 when\
      \ requiring lower height, use 3 when requiring higher height.\n\n-\n\n## 3.\
      \ Perception and Interaction\n- `robot_speak(text, volume)`: Voice broadcast\
      \ (Non-blocking). text required\n- `have_a_look(user_query)`: Visual observation\
      \ and analysis. user_query required, used to guide observation needs, return\
      \ corresponding information based on user needs. Note: If subsequent task needs\
      \ to operate based on visual results (e.g., measure distance of an object, track\
      \ an object), please explicitly request returning the object's center coordinate\
      \ (x,y) in the frame, or tracking object's coordinate position (x1, x2, y1,\
      \ y2) in the query. If just simple identification or detection, no specific\
      \ coordinate information needed.\n  - When ranging, center coordinate (x,y)\
      \ is needed\n  - When tracking object, top-left and bottom-right coordinates\
      \ (x1, x2, y1, y2) are needed\n- `capture_image(save_path)`: Take photo\n- `get_depth_at_point(x,\
      \ y)`: Get distance (unit: meter) of specified coordinate (x,y) in depth camera\
      \ frame. Must use with visual recognition result.\n- `get_battery_info()`: Get\
      \ battery level\n- `get_status()`: Get full robot status (posture, battery,\
      \ connection status etc.)\n- `start_lidar(wait_time_s, check_before_start)`:\
      \ Start LiDAR. wait_time_s default 10.0, check_before_start default True\n-\
      \ `stop_lidar(force_kill, wait_time_s)`: Stop LiDAR. force_kill default False,\
      \ wait_time_s default 3.0\n- `get_lidar_data(timeout_s, sample_count)`: Get\
      \ raw LiDAR data. timeout_s default 10.0, sample_count default 1\n- `get_lidar_360_data(timeout_s)`:\
      \ Get 360 degree LiDAR data. timeout_s default 5.0\n- `get_lidar_range_at_angle(target_angle,\
      \ angle_tolerance, timeout_s)`: Get LiDAR ranging data at specified angle. target_angle\
      \ required, angle_tolerance default 0.2, timeout_s default 5.0. 0 degrees is\
      \ front, 90 degrees is left, -179 degrees is back, -90 degrees is right\n- `check_lidar_status()`:\
      \ Check LiDAR status\n\n## 4. Navigation and Localization\n- `set_initial_pose(x,\
      \ y, yaw)`: Set initial pose\n- `navigate_to_pose(x, y, yaw, timeout_s)`: Navigate\
      \ to coordinate point\n- `save_current_position(position_name)`: Save current\
      \ position\n- `navigate_to_saved_position(position_name)`: Navigate to saved\
      \ position\n- `list_saved_positions()`: List saved positions\n- `get_saved_position(position_name)`:\
      \ Get saved position info\n- `delete_saved_position(position_name)`: Delete\
      \ saved position\n- `clear_all_positions(confirm)`: Clear all saved position\
      \ info\n\n## 5. Flow Control\n- `wait_for_async_completion(request_id, timeout)`:\
      \ Wait for specified request_id asynchronous task to complete. request_id optional\
      \ (default current task), timeout default 30 seconds. Used to ensure all background\
      \ asynchronous actions (like voice, movement) are fully executed.\n\n## 6. Action\
      \ Learning\n- `prepare_learning_posture()`: Enter performance preparation posture\n\
      - `start_continuous_action_learning(sequence_name=\"<Action Name>\")`: Start\
      \ continuous action learning (Auto sampling recording)\n- `play_action_sequence(filename=\"\
      <Action Name>\")`: Play action sequence\n- `play_continuous_action_sequence(filename=\"\
      <Action Name>\", playback_speed=1.0)`: Play continuous action sequence\n- `list_action_files()`:\
      \ List saved action files\n- `delete_action_file(filename)`: Delete action file\n\
      \n## 7. Auto-Pilot and Line Following (or Tracking xx color object)\n- `direct_line_follow(hsv_threshold,\
      \ timeout_s)`: Start line following auto-pilot. (Start tracking xxx color object)\n\
      \    - hsv_threshold: Must be HSV list containing 6 integers `[h_min, s_min,\
      \ v_min, h_max, s_max, v_max]`.\n    - Note: If you receive task \"Walk along\
      \ red line\", please be sure to check the [Common Color HSV Reference Table]\
      \ below, convert \"Red\" to corresponding HSV array `[0, 120, 70, 10, 255, 255]`\
      \ and fill in parameter. Strictly forbid filling in string \"red\".\n    - timeout_s:\
      \ Optional (default no timeout)\n\n### Common Color HSV Reference Table\n- Red:\
      \ `[0, 120, 184, 65, 253, 255]`\n- Yellow: `[20, 100, 100, 40, 255, 255]`\n\
      - Green: `[40, 100, 100, 85, 255, 255]`\n- Blue: `[55, 187, 91, 112, 253, 255]`\n\
      - Purple: `[130, 100, 100, 160, 255, 255]`\n- Orange: `[10, 100, 100, 20, 255,\
      \ 255]`\n- Cyan: `[85, 100, 100, 100, 255, 255]`\n- White: `[0, 0, 200, 180,\
      \ 30, 255]`\n- Black: `[0, 0, 0, 180, 255, 50]`\n\n## 8. KCF Target Tracking\n\
      - `set_kcf_target(x1, y1, x2, y2)`: Set and start KCF tracking. x1,y1 are top-left\
      \ coordinates, x2,y2 are bottom-right coordinates.\n- `stop_kcf_tracking()`:\
      \ Stop KCF tracking."
    value_type: string
  - description: ''
    id: 5dd8c1ba-2827-49b5-8a5c-b17e5d631afc
    name: ability
    selector:
    - env
    - ability
    value: "# Hexapod Robot Ability Library\n\n## Forward\nCommon descriptions: Forward,\
      \ Move forward, Go forward, forward\nNo prerequisite actions\n\n## Backward\n\
      Common descriptions: Backward, Move backward, Go back, backward\nNo prerequisite\
      \ actions\n\n## Move Left\nCommon descriptions: Move left, Shift left, Walk\
      \ left\nNo prerequisite actions\n\n## Move Right\nCommon descriptions: Move\
      \ right, Shift right, Walk right\nNo prerequisite actions\n\n## Turn Left\n\
      Common descriptions: Turn left, Rotate left, Turn to the left, Spin clockwise\n\
      No prerequisite actions\n\n## Turn Right\nCommon descriptions: Turn right, Rotate\
      \ right, Turn to the right, Spin counter-clockwise\nNo prerequisite actions\n\
      \n## Stop\nCommon descriptions: Stop, Halt, Pause, stop\nNo prerequisite actions\n\
      \n## Adjust Body Height\nCommon descriptions: Raise body, Lower body, Adjust\
      \ height, Squat, Stand high\nNo prerequisite actions\n\n## Restore Default Posture\n\
      Common descriptions: Restore default posture\nNo prerequisite actions\n\n##\
      \ Head Move (head_move) (Preset Action Group)\nCommon descriptions: Look up,\
      \ Look down, Look left, Look right, Turn head\nNo prerequisite actions\n\n##\
      \ Stretch (stretch) (Preset Action Group)\nCommon descriptions: Stretch, Stretch\
      \ body, stretch\nNo prerequisite actions\n\n## Say Hello (say_hello) (Preset\
      \ Action Group)\nCommon descriptions: Say hello, Greet, say hello, Wave hello\n\
      No prerequisite actions\n\n## Fear Retreat (fear_retreat) (Preset Action Group)\n\
      Common descriptions: Scared, Fear, Retreat in fear\nNo prerequisite actions\n\
      \n## Wave No (Preset Action Group)\nCommon descriptions: Wave hand, Say no,\
      \ Refuse, wave no\nNo prerequisite actions\n\n## Curl Up (Preset Action Group)\n\
      Common descriptions: Curl up, Shrink into a ball, curl up\nNo prerequisite actions\n\
      \n## Warm-up Squat/Push-up (Preset Action Group)\nCommon descriptions: Squat\
      \ down, Warm up, Squat up and down, squat, Do a push-up\nNo prerequisite actions\n\
      \n## Rotate in Place (Preset Action Group)\nCommon descriptions: Spin in place,\
      \ spin, Rotate, Turn a circle\nNo prerequisite actions\n\n## Big Stride (Preset\
      \ Action Group)\nCommon descriptions: Big stride, Take big steps, big stride\n\
      No prerequisite actions\n\n## Point Left Front (Preset Action Group)\nCommon\
      \ descriptions: Point left front, Raise left hand, Point to the left\nNo prerequisite\
      \ actions\n\n## Point Right Front (Preset Action Group)\nCommon descriptions:\
      \ Point right front, Raise right hand, Point to the right\nNo prerequisite actions\n\
      \n## Get Robot Status\nCommon descriptions: Check status, Status check, Self-check\n\
      No prerequisite actions\n\n## Get Battery Info\nCommon descriptions: Check battery,\
      \ Battery status, Remaining battery\nNo prerequisite actions\n\n## Start Camera\n\
      Common descriptions: Open camera, Start camera, Turn on camera\nNo prerequisite\
      \ actions\n\n## Capture Image\nCommon descriptions: Take photo, Shoot, Photograph,\
      \ capture\nNo prerequisite actions\n\n## Intelligent Visual Analysis\nAction\
      \ Description: Capture the front view and use AI to analyze specified questions.\n\
      Common descriptions: Have a look, Observe, Analyze frame, Identify, Detect\n\
      When planning startup, broadcast instructions should be anthropomorphic, like:\
      \ \"Let me take a look\".\nNote:\n- If it is just simple identification or detection,\
      \ no specific coordinate information needs to be returned.\n- If subsequent\
      \ tasks need to measure the distance of an object, must explicitly request returning\
      \ the center coordinate (x,y) of the object in the frame in the analysis instruction,\
      \ e.g., \"Judge if there is black clothing in the frame, if so return its center\
      \ coordinate position in the frame\". If tracking/following an object, must\
      \ explicitly request returning the coordinate position (x1, x2, y1, y2) of the\
      \ object in the frame. What needs to be returned depends on the requirements\
      \ of subsequent instructions.\n\n## Ranging (Prioritize depth camera for cases\
      \ without explicit equipment, then LiDAR)\nAction Description: Use depth camera\
      \ or LiDAR to measure distance ahead.\nCommon descriptions: Measure distance,\
      \ Distance measurement, Ranging, How far, Far, Look at distance\nPrerequisite\
      \ parameters:\n    - Depth Camera Ranging (Measure distance of specified object\
      \ in frame): Need to first obtain the object's coordinate (x,y) in the frame.\n\
      \    - LiDAR Ranging (Measure distance at specified angle/azimuth): Need to\
      \ first set measurement angle/azimuth.\n    - LiDAR Ranging (Measure distance\
      \ ahead): No prerequisite parameters, default uses directly forward azimuth.\n\
      \    - LiDAR Ranging (Get complete distance data): No prerequisite parameters,\
      \ return all measured distance values.\n\n## Start LiDAR\nCommon descriptions:\
      \ Open radar, Start lidar, Turn on radar\nNo prerequisite actions\n\n## Stop\
      \ LiDAR\nCommon descriptions: Close radar, Stop lidar, Turn off radar\nNo prerequisite\
      \ actions\n\n## Get LiDAR Data\nCommon descriptions: Scan surroundings, Get\
      \ radar info, Read radar\nPrerequisite actions: Need to \"Start LiDAR\" first\n\
      \n## Get 360 Degree LiDAR Data\nCommon descriptions: Omni-directional scan,\
      \ Get all surrounding distances, 360 degree ranging\nPrerequisite actions: Need\
      \ to \"Start LiDAR\" first\n\n## Get LiDAR Distance at Specified Angle\nCommon\
      \ descriptions: Measure distance ahead, Measure distance on the right, Measure\
      \ distance at specified angle\nPrerequisite actions: Need to \"Start LiDAR\"\
      \ first\n\n## Check LiDAR Status\nCommon descriptions: Radar status, Check if\
      \ radar is normal\nNo prerequisite actions\n\n## Line Following Movement\nAction\
      \ Description: Automatically drive along lines of specified color.\nCommon descriptions:\
      \ Follow xx line, Drive along xx line, Auto patrol xx line, Follow xx color\
      \ line, Walk along red line\nParameter Explanation:\n    - Can use natural language\
      \ to describe color when planning (e.g., Red, Yellow, Blue, etc.).\n    - \"\
      Line\" here usually refers to colored tapes or lines on the ground.\n\n## Track\
      \ xxx Color Object\nNote distinction from KCF. Usually this kind of object refers\
      \ to \"color block\", \"cylinder\", etc., rather than common life items like\
      \ \"apple\", \"phone\". Tracking xxx color object actually calls the same method\
      \ as line following movement. When color tracking, do not call intelligent visual\
      \ analysis, start tracking directly.\n\n## Save Current Position\nCommon descriptions:\
      \ Record location as xxx, Save coordinates, Mark current point\nNo prerequisite\
      \ actions\n\n## List Saved Positions\nAction Description: View list of all saved\
      \ positions\nCommon descriptions: View saved positions, Location list, Recorded\
      \ places\nNo prerequisite actions\n\n## Get Saved Position Info\nAction Description:\
      \ Get coordinate info of position with specified name\nCommon descriptions:\
      \ View coordinates of location xxx, Get info of location xxx\nNo prerequisite\
      \ actions\n\n## Delete Specified Position\nCommon descriptions: Delete location\
      \ xxx, Delete saved location xxx, Remove location xxx\n\n## Clear All Saved\
      \ Positions\nCommon descriptions: Clear all locations, Delete all saved locations,\
      \ Reset system location records\n\n## Navigate to Specified Position\nAction\
      \ Description: Automatically navigate to saved target position\nCommon descriptions:\
      \ Go to a place, Navigate to, Go to, Walk to\nPrerequisite actions: Need to\
      \ \"Get Saved Position Info\" first to confirm target position exists\n\n##\
      \ Navigate to Specified Coordinate\nAction Description: Navigate to specified\
      \ x,y coordinate point\nCommon descriptions: Go to coordinate, Go to coordinate\
      \ point\nNo prerequisite actions\n\n## Enter Performance Preparation Posture\
      \ (Action Sequence)\nAction Description: Enter performance preparation posture,\
      \ ready to start performance\n\n## Learn xxx Action (Action Sequence)\nAction\
      \ Description: Automatically record robot action trajectory continuously within\
      \ specified time\nCommon descriptions: Continuous recording, Auto record action,\
      \ Start continuous learning\n\n## Stop Action Learning (Action Sequence)\nAction\
      \ Description: End current action learning mode\nCommon descriptions: Stop learning,\
      \ End recording, Finish learning\nNo prerequisite actions\n\n## Save Action\
      \ Sequence\nAction Description: Save recorded action sequence as file\nCommon\
      \ descriptions: Save action, Save it, Save as file\nPrerequisite actions: Need\
      \ to finish recording first\n\n## Play Action Sequence\nAction Description:\
      \ Play previously learned recorded action sequence (supports normal sequence\
      \ and continuous sequence)\nCommon descriptions: Repeat action, Play action,\
      \ Execute learned action, Start performing xxx action\nPrerequisite actions:\
      \ Need to Enter Performance Preparation Posture first\n\n## View Action File\
      \ List\nCommon descriptions: View learned actions, Action list, Recorded actions\n\
      No prerequisite actions\n\n## Delete Action File\nCommon descriptions: Delete\
      \ action, Clear recording, Remove action file\nPrerequisite actions: Need to\
      \ \"View Action File List\" first to confirm file exists\n\n## KCF Target Tracking\n\
      Action Description: Set target area and automatically start visual tracking\n\
      Common descriptions: Track target, Follow object, Target tracking\nPrerequisite\
      \ parameters:\n    - Need to first obtain target coordinate area [x1, y1, x2,\
      \ y2] in frame via visual analysis.\n\n## Stop KCF Tracking\nCommon descriptions:\
      \ Stop tracking, Don't track, Stop following, stop tracking\nNo prerequisite\
      \ actions\n\n## Special Ability: Chat\nWhen user asks robot questions, robot\
      \ can interact with user via chat function.\nPlanning here can be like this:\
      \ \"Answer (or respond to) user's question. The question user asked is/User\
      \ said: {(User question original text)}\"\n\n## Special Ability: Context Memory\n\
      This ability is built-in to Muto, no extra planning needed. When user asks Muto\
      \ to remember something, just plan to let Muto tell the user that it has been\
      \ noted down.\n\n# Unsupported Actions and Replies\n\n## Fly\nReply: I don't\
      \ have the function to fly to the sky yet~ Robots can only move on the ground!\n\
      \n## Swim\nReply: I don't have waterproof function, cannot go into water to\
      \ swim~\n\n## Climb\nReply: For safety considerations, I cannot climb~ You can\
      \ try letting me walk over!\n\n## Weightlifting/Carrying Heavy Objects\nReply:\
      \ My strength is not enough, cannot carry heavy objects~\n\n## Open/Close Door\n\
      Reply: I don't have the function to operate door handles yet~\n\n## Charge\n\
      Reply: I don't have autonomous charging function yet, need human help to charge~.\n\
      # Intent Mapping\n\n- **Command 1**: \"I'm currently at place1, and I'm feeling\
      \ a bit thirsty\"\n  - **Intent Analysis 1**: Search the map to identify which\
      \ area contains bottled water, then navigate to that area to locate the water\n\
      \  - **Example**: 1. Navigate to Area A, 2. Observe whether bottled water is\
      \ present, 3. If bottled water is detected, measure the distance between it\
      \ and yourself, 4. Navigate back to the user's location at place1, then report\
      \ the findings\n\n- **Command 2**: \"I want to sleep\"\n  - **Intent Analysis\
      \ 2**: 1. Navigate to the master bedroom and observe whether the environment\
      \ is suitable for sleeping, 2. Tell the user a bedtime story to help calm their\
      \ emotions\n\n# Item Storage Locations\n\n**Master Bedroom**\n- Tissues, pen,\
      \ mobile phone\n\n**Kitchen**\n- Bottled water, Coca-Cola, Sprite, bread\n\n\
      **Zoo**\n- Monkeys, tigers, sudo cat /root/muto-llm-2.0/prompt_backup_en/env/ability.mdpt_backup_en/env/ability.md\n\
