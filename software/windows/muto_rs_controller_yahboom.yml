      \ to describe color when planning (e.g., Red, Yellow, Blue, etc.).\n    - \"\
      Line\" here usually refers to colored tapes or lines on the ground.\n\n## Track\
      \ xxx Color Object\nNote distinction from KCF. Usually this kind of object refers\
      \ to \"color block\", \"cylinder\", etc., rather than common life items like\
      \ \"apple\", \"phone\". Tracking xxx color object actually calls the same method\
      \ as line following movement. When color tracking, do not call intelligent visual\
      \ analysis, start tracking directly.\n\n## Save Current Position\nCommon descriptions:\
      \ Record location as xxx, Save coordinates, Mark current point\nNo prerequisite\
      \ actions\n\n## List Saved Positions\nAction Description: View list of all saved\
      \ positions\nCommon descriptions: View saved positions, Location list, Recorded\
      \ places\nNo prerequisite actions\n\n## Get Saved Position Info\nAction Description:\
      \ Get coordinate info of position with specified name\nCommon descriptions:\
      \ View coordinates of location xxx, Get info of location xxx\nNo prerequisite\
      \ actions\n\n## Delete Specified Position\nCommon descriptions: Delete location\
      \ xxx, Delete saved location xxx, Remove location xxx\n\n## Clear All Saved\
      \ Positions\nCommon descriptions: Clear all locations, Delete all saved locations,\
      \ Reset system location records\n\n## Navigate to Specified Position\nAction\
      \ Description: Automatically navigate to saved target position\nCommon descriptions:\
      \ Go to a place, Navigate to, Go to, Walk to\nPrerequisite actions: Need to\
      \ \"Get Saved Position Info\" first to confirm target position exists\n\n##\
      \ Navigate to Specified Coordinate\nAction Description: Navigate to specified\
      \ x,y coordinate point\nCommon descriptions: Go to coordinate, Go to coordinate\
      \ point\nNo prerequisite actions\n\n## Enter Performance Preparation Posture\
      \ (Action Sequence)\nAction Description: Enter performance preparation posture,\
      \ ready to start performance\n\n## Learn xxx Action (Action Sequence)\nAction\
      \ Description: Automatically record robot action trajectory continuously within\
      \ specified time\nCommon descriptions: Continuous recording, Auto record action,\
      \ Start continuous learning\n\n## Stop Action Learning (Action Sequence)\nAction\
      \ Description: End current action learning mode\nCommon descriptions: Stop learning,\
      \ End recording, Finish learning\nNo prerequisite actions\n\n## Save Action\
      \ Sequence\nAction Description: Save recorded action sequence as file\nCommon\
      \ descriptions: Save action, Save it, Save as file\nPrerequisite actions: Need\
      \ to finish recording first\n\n## Play Action Sequence\nAction Description:\
      \ Play previously learned recorded action sequence (supports normal sequence\
      \ and continuous sequence)\nCommon descriptions: Repeat action, Play action,\
      \ Execute learned action, Start performing xxx action\nPrerequisite actions:\
      \ Need to Enter Performance Preparation Posture first\n\n## View Action File\
      \ List\nCommon descriptions: View learned actions, Action list, Recorded actions\n\
      No prerequisite actions\n\n## Delete Action File\nCommon descriptions: Delete\
      \ action, Clear recording, Remove action file\nPrerequisite actions: Need to\
      \ \"View Action File List\" first to confirm file exists\n\n## KCF Target Tracking\n\
      Action Description: Set target area and automatically start visual tracking\n\
      Common descriptions: Track target, Follow object, Target tracking\nPrerequisite\
      \ parameters:\n    - Need to first obtain target coordinate area [x1, y1, x2,\
      \ y2] in frame via visual analysis.\n\n## Stop KCF Tracking\nCommon descriptions:\
      \ Stop tracking, Don't track, Stop following, stop tracking\nNo prerequisite\
      \ actions\n\n## Special Ability: Chat\nWhen user asks robot questions, robot\
      \ can interact with user via chat function.\nPlanning here can be like this:\
      \ \"Answer (or respond to) user's question. The question user asked is/User\
      \ said: {(User question original text)}\"\n\n## Special Ability: Context Memory\n\
      This ability is built-in to Muto, no extra planning needed. When user asks Muto\
      \ to remember something, just plan to let Muto tell the user that it has been\
      \ noted down.\n\n# Unsupported Actions and Replies\n\n## Fly\nReply: I don't\
